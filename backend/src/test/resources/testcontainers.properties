# TestContainers Configuration
# This file configures TestContainers to properly detect and use Docker

# Enable container reuse for faster test execution
# Containers will be reused across test runs if they match the configuration
testcontainers.reuse.enable=true

# Docker host configuration
# Explicitly set the Docker socket path (Unix socket)
docker.host=unix:///var/run/docker.sock

# Docker API version - explicitly set to match Docker daemon requirements
# Docker 29.x requires API version 1.44 or higher
docker.api.version=1.46

# Disable checks that might prevent TestContainers from starting
# This can help bypass environment detection issues
checks.disable=false

# Ryuk (TestContainers resource reaper) configuration
# Ryuk is responsible for cleaning up containers after tests
ryuk.container.image=testcontainers/ryuk:0.5.1
ryuk.disabled=false

# Logging configuration
# Set to true to see more detailed logs from TestContainers
testcontainers.logger.level=DEBUG
