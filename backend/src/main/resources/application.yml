server:
  port: 8080
  servlet:
    context-path: /api/v1

spring:
  application:
    name: iam-server

  profiles:
    active: dev   # override with -Dspring.profiles.active=prod for production

  security:
    oauth2:
      authorizationserver:
        client:
          iam-client:
            registration:
              client-id: iam-client
              client-secret: "{noop}secret"
              client-authentication-methods:
                - client_secret_basic
              authorization-grant-types:
                - authorization_code
                - refresh_token
                - client_credentials
              redirect-uris:
                - http://localhost:8080/login/oauth2/code/iam-client
              scopes:
                - read
                - write
            require-authorization-consent: true

app:
  jwt:
    secret: ${JWT_SECRET:VibesIAM-dev-secret-key-must-be-at-least-256bits-long-change-in-prod}
    expiration: 86400000      # 24 hours
    refresh-expiration: 604800000  # 7 days

  security:
    password:
      min-length: 8
      require-uppercase: true
      require-lowercase: true
      require-numbers: true
      require-special-chars: true
    session:
      max-sessions: 5
      timeout: 1800  # 30 minutes

  cors:
    # Safe default - overridden per profile.
    # Dev: "*"  |  Prod: ${CORS_ALLOWED_ORIGINS}  |  Test: http://localhost:3000
    allowed-origins: http://localhost:3000

  rate-limiting:
    enabled: true
    auth-requests-per-minute: 20

# Baseline actuator exposure — profiles may narrow or widen this.
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized