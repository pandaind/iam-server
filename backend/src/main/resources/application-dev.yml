# ──────────────────────────────────────────────────────────────────────────────
# DEV profile — local development with H2 in-memory database
# Activated by: spring.profiles.active=dev  (default in application.yml)
# ──────────────────────────────────────────────────────────────────────────────

spring:
  datasource:
    url: jdbc:h2:mem:iamdb
    driver-class-name: org.h2.Driver
    username: sa
    password:

  jpa:
    hibernate:
      ddl-auto: create-drop
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.H2Dialect

  h2:
    console:
      enabled: true
      path: /h2-console

app:
  cors:
    # Permissive in dev — any local tool / frontend port is allowed.
    # Never deploy this value to production.
    allowed-origins: "*"

  rate-limiting:
    # Relaxed ceiling so manual testing and Newman don't hit the limit.
    auth-requests-per-minute: 100

logging:
  level:
    com.vibes.iam: DEBUG
    org.springframework.security: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} - %logger{36} - %level - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,env,beans
  endpoint:
    health:
      show-details: always
