##############################################################################
# secrets.yaml — IAM Server Kubernetes Secrets
#
# DO NOT commit real values. Two recommended approaches:
#
# 1. Sealed Secrets (recommended for GitOps):
#    kubeseal --format yaml < secrets-plaintext.yaml > secrets-sealed.yaml
#    kubectl apply -f secrets-sealed.yaml
#
# 2. External Secrets Operator (for Vault / AWS SSM / GCP Secret Manager):
#    See ops/k8s/external-secrets.yaml.example
#
# 3. Manual bootstrap (CI/CD pipeline injects real values):
#    kubectl create secret generic iam-server-secrets -n iam-system \
#      --from-literal=DB_USERNAME=<value> \
#      --from-literal=DB_PASSWORD=<value> \
#      --from-literal=JWT_SECRET=$(openssl rand -base64 64) \
#      --from-literal=POSTGRES_USER=<value> \
#      --from-literal=POSTGRES_PASSWORD=<value> \
#      --from-literal=POSTGRES_DB=iamdb \
#      --from-literal=CORS_ALLOWED_ORIGINS=https://app.yourdomain.com
#
# The stringData values below are PLACEHOLDERS — replace before applying.
##############################################################################
apiVersion: v1
kind: Secret
metadata:
  name: iam-server-secrets
  namespace: iam-system
  labels:
    app.kubernetes.io/name: iam-server
    app.kubernetes.io/component: secrets
type: Opaque
stringData:
  DB_USERNAME: "REPLACE_ME"
  DB_PASSWORD: "REPLACE_ME"
  # Generate with: openssl rand -base64 64
  JWT_SECRET: "REPLACE_ME_with_64+_char_random_string"
  POSTGRES_USER: "REPLACE_ME"
  POSTGRES_PASSWORD: "REPLACE_ME"
  POSTGRES_DB: "iamdb"
  # Comma-separated list of frontend origins allowed for CORS
  CORS_ALLOWED_ORIGINS: "https://app.yourdomain.com"
---
# TLS Secret — managed by cert-manager in production.
# If not using cert-manager, create manually:
#   kubectl create secret tls iam-server-tls \
#     --cert=path/to/tls.crt --key=path/to/tls.key \
#     -n iam-system
apiVersion: v1
kind: Secret
metadata:
  name: iam-server-tls
  namespace: iam-system
  labels:
    app.kubernetes.io/name: iam-server
    app.kubernetes.io/component: tls
type: kubernetes.io/tls
data:
  tls.crt: ""   # base64-encoded certificate — populated by cert-manager
  tls.key: ""   # base64-encoded private key  — populated by cert-manager