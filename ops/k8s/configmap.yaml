apiVersion: v1
kind: ConfigMap
metadata:
  name: iam-server-config
  namespace: iam-system
  labels:
    app.kubernetes.io/name: iam-server
    app.kubernetes.io/component: config
data:
  # Mounted at /app/config/application-k8s.yml and loaded via SPRING_CONFIG_LOCATION.
  # Extends application-prod.yml — only add k8s-specific overrides here.
  application-k8s.yml: |
    spring:
      datasource:
        url: jdbc:postgresql://postgres-service:5432/${DB_NAME:iamdb}

      # Redis for distributed session / token blacklist store
      data:
        redis:
          host: redis-service
          port: 6379
          timeout: 2000ms
          lettuce:
            pool:
              max-active: 8
              max-idle: 8
              min-idle: 0

      session:
        store-type: redis
        timeout: 30m

    app:
      cors:
        # Override from secret/env — set CORS_ALLOWED_ORIGINS in the deployment env.
        allowed-origins: ${CORS_ALLOWED_ORIGINS}

    # Expose Prometheus scrape endpoint for Prometheus Operator / annotation-based scraping
    management:
      endpoints:
        web:
          exposure:
            include: health,info,prometheus
      endpoint:
        health:
          show-details: when-authorized
          probes:
            enabled: true      # enables /actuator/health/liveness and /readiness
      metrics:
        export:
          prometheus:
            enabled: true