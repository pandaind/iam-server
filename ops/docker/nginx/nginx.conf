##############################################################################
# Nginx reverse proxy — IAM Server
#
# Topology (docker compose --profile proxy):
#   Browser → Nginx :80/:443 → Frontend :3000
#                             → Backend  :8080  (/api/v1/*, /swagger-ui/*)
#
# For local dev without SSL, listen on port 80 only and remove the HTTPS block.
# For production, place real certs at:
#   ops/docker/nginx/ssl/server.crt
#   ops/docker/nginx/ssl/server.key
# or use cert-manager in Kubernetes.
##############################################################################

events {
    worker_connections 1024;
}

http {
    include       /etc/nginx/mime.types;
    default_type  application/octet-stream;
    sendfile      on;
    keepalive_timeout 65;

    # ── Upstreams ──────────────────────────────────────────────────────────────
    upstream iam-backend {
        server iam-server:8080;
        keepalive 16;
    }

    upstream iam-frontend {
        server frontend:3000;
        keepalive 16;
    }

    # ── Rate limiting zones ────────────────────────────────────────────────────
    limit_req_zone $binary_remote_addr zone=api:10m     rate=20r/s;
    limit_req_zone $binary_remote_addr zone=auth:10m    rate=5r/m;   # login / refresh / logout
    limit_req_status 429;

    # ── SSL ────────────────────────────────────────────────────────────────────
    ssl_protocols    TLSv1.2 TLSv1.3;
    ssl_ciphers      ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;

    # ── Gzip ───────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_types text/plain text/css application/json application/javascript
               text/xml application/xml text/javascript;

    # ── Common proxy headers (included by each location) ──────────────────────
    proxy_http_version   1.1;
    proxy_set_header     Host              $host;
    proxy_set_header     X-Real-IP         $remote_addr;
    proxy_set_header     X-Forwarded-For   $proxy_add_x_forwarded_for;
    proxy_set_header     X-Forwarded-Proto $scheme;
    proxy_set_header     Connection        "";
    proxy_connect_timeout 10s;
    proxy_send_timeout    30s;
    proxy_read_timeout    30s;

    # ── HTTP → HTTPS redirect ──────────────────────────────────────────────────
    server {
        listen 80;
        server_name _;
        return 301 https://$host$request_uri;
    }

    # ── HTTPS server ───────────────────────────────────────────────────────────
    server {
        listen 443 ssl http2;
        server_name localhost;   # replace with your domain in production

        ssl_certificate     /etc/nginx/ssl/server.crt;
        ssl_certificate_key /etc/nginx/ssl/server.key;

        # ── Security headers ──────────────────────────────────────────────────
        add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
        add_header X-Frame-Options            DENY                               always;
        add_header X-Content-Type-Options     nosniff                            always;
        add_header Referrer-Policy            "strict-origin-when-cross-origin"  always;
        add_header Permissions-Policy         "geolocation=(), microphone=(), camera=()" always;
        add_header Content-Security-Policy    "default-src 'self'; script-src 'self' 'unsafe-inline'; style-src 'self' 'unsafe-inline'; img-src 'self' data:; font-src 'self';" always;

        # ── Auth endpoints — strict rate limiting ──────────────────────────────
        location ~ ^/api/v1/auth/(login|refresh|logout) {
            limit_req zone=auth burst=3 nodelay;
            proxy_pass http://iam-backend;
        }

        # ── Backend API ────────────────────────────────────────────────────────
        location /api/ {
            limit_req zone=api burst=40 nodelay;
            proxy_pass http://iam-backend;
        }

        # ── OAuth2 + OIDC discovery ────────────────────────────────────────────
        location ~ ^/(oauth2|\.well-known)/ {
            proxy_pass http://iam-backend;
        }

        # ── Swagger UI ─────────────────────────────────────────────────────────
        location /swagger-ui/ {
            proxy_pass http://iam-backend;
        }
        location /v3/api-docs {
            proxy_pass http://iam-backend;
        }

        # ── Actuator health (no access log, used by load-balancer probes) ──────
        location = /api/v1/actuator/health {
            access_log off;
            proxy_pass http://iam-backend;
        }

        # ── Frontend — all other traffic ───────────────────────────────────────
        location / {
            proxy_pass http://iam-frontend;
        }
    }
}
